<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; }
      body {
        background: radial-gradient(120% 90% at 50% -10%, #1b1b1f 0%, #0c0c0d 65%);
        color: #ECECEA;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
        border: 1px solid #333338;
        box-sizing: border-box;
        -webkit-user-select: none; user-select: none;
      }
      .logo {
        width: 76px; height: 76px; display: grid; place-items: center; overflow: hidden;
        border-radius: 18px; border: 1px solid #333338; background: #34343b;
        box-shadow: 0 0 36px rgba(217,160,30,0.22);
      }
      .logo img { width: 70px; height: 70px; max-width: none; transform: scale(1.6); object-fit: contain; }
      .title { font-size: 20px; font-weight: 700; letter-spacing: .2px; text-shadow: 0 0 40px rgba(217,160,30,.25); }
      .sub { font-size: 12px; color: #9b9b9b; margin-top: -10px; }
      .bar { width: 220px; height: 4px; background: #212125; border-radius: 999px; overflow: hidden; margin-top: 4px; }
      .bar::after {
        content: ''; display: block; width: 40%; height: 100%;
        background: #d9a01e; border-radius: 999px;
        animation: slide 1.1s ease-in-out infinite;
      }
      @keyframes slide {
        0% { transform: translateX(-110%); }
        100% { transform: translateX(280%); }
      }
    </style>
  </head>
  <body>
    <div class="logo"><img src="../basalt.png" alt="Basalt" /></div>
    <div class="title">Basalt</div>
    <div class="sub">carregando…</div>
    <div class="bar"></div>
  </body>
</html>
