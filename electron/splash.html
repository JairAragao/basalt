<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; }
      body {
        background: radial-gradient(130% 100% at 50% 38%, #15151a 0%, #0a0a0b 62%);
        color: #ECECEA;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
        -webkit-user-select: none; user-select: none;
      }
      .stage { display: flex; flex-direction: column; align-items: center; gap: 16px; animation: rise .7s ease-out both; }

      /* logo SEM moldura — só o ícone com uma luz radial atrás pra destacar */
      .logo { position: relative; display: grid; place-items: center; width: 260px; height: 260px; }
      .logo::before {
        content: ''; position: absolute; inset: -20px; border-radius: 50%;
        background: radial-gradient(circle, rgba(217,160,30,.45) 0%, rgba(217,160,30,.16) 42%, transparent 70%);
        animation: pulse 2.8s ease-in-out infinite;
      }
      .logo img {
        position: relative; z-index: 1;
        width: 210px; height: 210px; max-width: none; object-fit: contain;
        transform: scale(1.25);
        filter: drop-shadow(0 0 24px rgba(217,160,30,.35));
      }

      .title { font-size: 32px; font-weight: 700; letter-spacing: .4px; text-shadow: 0 0 50px rgba(217,160,30,.35); }
      .sub { font-size: 13px; color: #9b9b9b; margin-top: -10px; letter-spacing: .3px; }

      /* barra DETERMINADA — enche de 0 a 100% até completar */
      .bar { width: 320px; height: 5px; background: #1d1d21; border-radius: 999px; overflow: hidden; margin-top: 8px; }
      .bar > i {
        display: block; height: 100%; width: 0;
        background: linear-gradient(90deg, #b9821a, #d9a01e 55%, #f3c75a);
        border-radius: 999px;
        box-shadow: 0 0 12px rgba(217,160,30,.5);
        animation: fill 3.4s cubic-bezier(.3,.6,.3,1) forwards;
      }

      @keyframes pulse {
        0%, 100% { opacity: .6; transform: scale(.94); }
        50% { opacity: 1; transform: scale(1.06); }
      }
      @keyframes fill { from { width: 0; } to { width: 100%; } }
      @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="logo"><img src="../basalt.png" alt="Basalt" /></div>
      <div class="title">Basalt</div>
      <div class="sub">carregando seu vault…</div>
      <div class="bar"><i></i></div>
    </div>
  </body>
</html>
