name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Testes (Vitest — formula/gute + watcher)
        run: npm test
      - name: Build do front (vite)
        run: npm run build
      - name: Auditoria de produção (não-dev)
        run: npm audit --omit=dev || true
