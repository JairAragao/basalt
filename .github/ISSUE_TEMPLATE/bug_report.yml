name: Bug report
description: Something is broken in Basalt
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open vault X
        2. Move a task to ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      description: What you expected to happen, and what actually happened.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Basalt version
      placeholder: "0.5.0 (header badge or installer name)"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: How are you running it?
      options:
        - Installed app (Electron)
        - Web dev (npm run dev)
        - npm start (prod web)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS 15 / Ubuntu 24.04"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / console output
      description: Server output or DevTools console errors, if any.
      render: shell
